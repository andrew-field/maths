name: Release Please

on:
  push:
    branches: [master]

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# Permissions for the GITHUB_TOKEN.
permissions: {}

jobs:
  release-please:
    name: Call release please
    uses: andrew-field/reusable-workflows/.github/workflows/release-please.yml@8c28e170c5d4039c41c0f85013b50fd5432bf6a3 # v1.5.8

    # Needs to inherit more than the GITHUB_TOKEN to trigger Github Actions CI checks. RELEASE_PLEASE_TOKEN needs to be added as a secret.
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
